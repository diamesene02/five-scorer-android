name: Build Five Scorer APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          accept-android-sdk-licenses: true

      - name: Install Android SDK packages
        run: |
          sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - name: Install Node deps
        run: npm install --no-audit --no-fund --prefer-offline=false

      - name: Bundle web app (esbuild)
        run: npm run bundle

      - name: Add Capacitor Android platform
        run: |
          if [ ! -d android ]; then
            npx cap add android
          fi

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Customize Android (icons + landscape)
        run: npm run android:customize

      - name: Build APK debug
        working-directory: android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Locate APK
        id: locate
        working-directory: android
        run: |
          APK=$(find app/build/outputs/apk/debug -name "*.apk" | head -1)
          echo "apk=$APK" >> "$GITHUB_OUTPUT"
          ls -la "$APK"

      - name: Upload APK as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: five-scorer-debug-apk
          path: android/${{ steps.locate.outputs.apk }}
          if-no-files-found: error

      - name: Publish APK to a rolling Release
        if: github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SHORT_SHA: ${{ github.sha }}
        working-directory: android
        run: |
          set -euo pipefail
          TAG="apk-latest"
          REPO="${GITHUB_REPOSITORY}"
          SHORT="${SHORT_SHA:0:7}"
          cp "${{ steps.locate.outputs.apk }}" "five-scorer.apk"
          ls -la five-scorer.apk
          cat > notes.md <<NOTES
          APK debug auto-built from main @ ${SHORT}.

          **Install**: download five-scorer.apk on your Android, open it -> Install.

          PIN: **1234** | Sync to Supabase enabled.
          NOTES
          if gh release view "$TAG" --repo "$REPO" >/dev/null 2>&1; then
            gh release delete "$TAG" --repo "$REPO" --yes --cleanup-tag
          fi
          gh release create "$TAG" five-scorer.apk --repo "$REPO" --title "Five Scorer APK (latest)" --notes-file notes.md

      - name: Post failure details as issue
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SHORT_SHA: ${{ github.sha }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          SHORT="${SHORT_SHA:0:7}"
          gh issue create \
            --title "CI: APK build failed @ ${SHORT}" \
            --body "**Workflow run**: ${RUN_URL}
          **Commit**: ${SHORT}
          **Branch**: ${REF_NAME}

          Check the workflow run logs above for details." \
            --label "bug" 2>/dev/null || \
          gh issue create \
            --title "CI: APK build failed @ ${SHORT}" \
            --body "**Workflow run**: ${RUN_URL}
          **Commit**: ${SHORT}
          **Branch**: ${REF_NAME}

          Check the workflow run logs above for details."
